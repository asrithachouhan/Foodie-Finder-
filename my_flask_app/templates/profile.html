{% extends "base.html" %}

{% block title %} Profile {% endblock %}

{% block content %}
    <div class="container">
        <div class="profile-container">
            <div class="profile-photo-container">
                <img src="{{ url_for('static', filename='images/user-profile.svg') }}" class="profile-photo">
            </div>
    
            <h2 class="text-center">User Profile</h2>
            <form action="/save_profile" method="POST">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Name:</label>
                    <input type="text" name="name" value="{{ user.name }}" readonly class="form-control">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email:</label>
                    <input type="email" name="email" value="{{ user.email }}" readonly class="form-control">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone Number:</label>
                    <input type="tel" 
                            name="phone" 
                            placeholder="Enter phone number"
                            value="{{ user.phone or '' }}"
                            pattern="[0-9]{10}"
                            title="Please enter a valid 10-digit phone number"
                            class="form-control">
                    <small class="form-text">Enter a 10-digit phone number (e.g., 1234567890)</small>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-venus-mars"></i> Gender:</label>
                    <select name="gender" class="form-control">
                        <option value="" {% if not user.gender %}selected{% endif %}>Select Gender</option>
                        <option value="Male" {% if user.gender == 'M' %}selected{% endif %}>Male</option>
                        <option value="Female" {% if user.gender == 'F' %}selected{% endif %}>Female</option>
                    </select>
                </div>
                
                <button type="submit" class="btn-primary">
                    <i class="fas fa-save"></i> Save Profile
                </button>
            </form>
        </div>
    </div>
{% endblock %}
